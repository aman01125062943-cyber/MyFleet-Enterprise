name: Deploy MyFleet to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: myfleet-vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.MYFLEET_VPS_SSH_KEY }}" > ~/.ssh/myfleet_vps_key
          chmod 600 ~/.ssh/myfleet_vps_key
          ssh-keyscan -p "${{ secrets.MYFLEET_VPS_PORT }}" "${{ secrets.MYFLEET_VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to isolated VPS path
        shell: bash
        run: |
          set -euo pipefail
          VPS_PATH="${{ secrets.MYFLEET_VPS_PATH }}"
          if [ -z "$VPS_PATH" ]; then
            VPS_PATH="/opt/myfleet-enterprise"
          fi

          ssh -i ~/.ssh/myfleet_vps_key -p "${{ secrets.MYFLEET_VPS_PORT }}" "${{ secrets.MYFLEET_VPS_USER }}@${{ secrets.MYFLEET_VPS_HOST }}" "mkdir -p '$VPS_PATH'"

          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'node_modules' \
            --exclude 'whatsapp-service/node_modules' \
            --exclude 'dist' \
            --exclude 'auth_sessions' \
            --exclude 'whatsapp-service/auth_sessions' \
            --exclude 'deploy/vps/.env' \
            -e "ssh -i ~/.ssh/myfleet_vps_key -p ${{ secrets.MYFLEET_VPS_PORT }}" \
            ./ "${{ secrets.MYFLEET_VPS_USER }}@${{ secrets.MYFLEET_VPS_HOST }}:$VPS_PATH/"

      - name: Build and restart isolated stack
        shell: bash
        run: |
          set -euo pipefail
          VPS_PATH="${{ secrets.MYFLEET_VPS_PATH }}"
          if [ -z "$VPS_PATH" ]; then
            VPS_PATH="/opt/myfleet-enterprise"
          fi

          ssh -i ~/.ssh/myfleet_vps_key -p "${{ secrets.MYFLEET_VPS_PORT }}" "${{ secrets.MYFLEET_VPS_USER }}@${{ secrets.MYFLEET_VPS_HOST }}" "set -e
            cd '$VPS_PATH'
            test -f deploy/vps/.env || cp deploy/vps/.env.example deploy/vps/.env
            docker compose -p myfleet_enterprise --env-file deploy/vps/.env -f deploy/vps/docker-compose.yml up -d --build --remove-orphans
            docker compose -p myfleet_enterprise -f deploy/vps/docker-compose.yml ps
          "
